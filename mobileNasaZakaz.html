<style>



body {

}

.sLineCapt{

.iFooter {

  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

td {

</style>
</HEAD>

<BODY onload="loadMainMenu()">
  
  <div class="RusCapt">
    <div class="MenuBtn" onclick="MenuClick()">	&#8801</div>      
    <div class="SearchWindow" id="SearchWindow">
      <label class="sLineCapt" for="sLine">Gooogle:</label>
      <input class="sLine" id="sLine" type="text" placeholder="Введите код или название..">
      <button onclick="Search()">Search</button>
    </div>  
  <div class="Caption" onclick="CleraArea()">N.A.S.A.:: Завозы</div>
  </div>
  
<div id="ZavozWnd" class="ZavozWnd" onclick="HideZavWnd()"></div>

<div id="mainMenu" class="Menu"></div>
<div id="resTable" class ="resTab">Нажмите меню или введите код или название...</div>            
<div class="iFooter">N.A.S.A. @2021</div>



<script>
    const data = [#@prmJSON];
    var LAST_DATA = [];
    var POS_X = 0;
    var POS_Y = 0;

    const getTips = (jsonData) =>{
      var tipArr =[];            
      var res =[];  

      jsonData.forEach(element => {
          tipArr.push(element.tip.toLowerCase());
        });

      tipArr.sort();
      
      res.push(tipArr[0]);
      for (let i = 0; i < tipArr.length-1; i++) {
          if (tipArr[i] != tipArr[i+1]) {
            res.push(tipArr[i+1]);
          }
      }
      return res;
    }

    const getPostav = (jsonData) =>{
      var tipArr =[];            
      var res =[];  

      jsonData.forEach(element => {
          tipArr.push(element.postav.toLowerCase());
        });

      tipArr.sort();
      
      res.push(tipArr[0]);
      for (let i = 0; i < tipArr.length-1; i++) {
          if (tipArr[i] != tipArr[i+1]) {
            res.push(tipArr[i+1]);
          }
      }
      return res;
    }

    function loadMainMenu(){
      var s='<div class="mainMenu"><ul class="list">';        
      var tipArr = getPostav(data);
        inx=0;
        tipArr.forEach(elm => {
          s=s+`<li id="postav${inx}" onclick="postavClick(${inx})">${elm}</li>`;
          inx++;
      });
      var res = document.getElementById("mainMenu");      
      res.innerHTML = s + '</ul></div>';

    //  document.body.addEventListener('click',(e)=>{
    //    POS_X = e.clientX;
    //    POS_Y = e.clientY;
    //    console.log(POS_X,POS_Y);
    //    })
    }

    function tipClick(tip){
      var res = document.getElementById("resTable");
      res.setAttribute("style","visibility:visible") ;     
      res.innerHTML = getTovByTip(tip);
      MenuHide();
    }

    function postavClick(tip){
      var res = document.getElementById("resTable");
      res.setAttribute("style","visibility:visible") ;     
      res.innerHTML = getTovByPostav(tip);
      MenuHide();
    }
    
    function postClick(tip){
      var res = document.getElementById("resTable");
      res.setAttribute("style","visibility:visible") ;     
      res.innerHTML = getTovByPostavClick(tip);
      MenuHide();
    }

    function kodClick(kod){
      var res = document.getElementById("resTable");
      res.setAttribute("style","visibility:visible") ;     
      res.innerHTML = getTovsByKod(kod);
      MenuHide();
    }    

    function nazvClick(tip){
      var res = document.getElementById("resTable");
      res.setAttribute("style","visibility:visible") ;     
      res.innerHTML = getTovByNazv(tip);
      MenuHide();
    }

    function getTovByNazv(nazv){
      var res =[];            
      data.forEach(el => {
          if (el.nazv.toLowerCase() == nazv.toLowerCase()){
              res.push(el);
          }
      });
      LAST_DATA = res;
      return MakeReport(res);
    }

    function getTovsByKod(kod){
      var res =[];            
      data.forEach(el => {
          if (el.kod.toLowerCase() == kod.toLowerCase()){
              res.push(el);
          }
      });
      LAST_DATA = res;
      return MakeReport(res);
    }

    function getTovByTip(tip){                
        var res =[];            
        data.forEach(el => {
            if (el.tip.toLowerCase() == tip.toLowerCase()){
                res.push(el);
            }
        });
        LAST_DATA = res;
        return MakeReport(res);
    }

    function getTovByPostavClick(postav){                
        var res =[];            
        data.forEach(el => {
            if (el.postav.toLowerCase() == postav.toLowerCase()){
                res.push(el);
            }
        });
        LAST_DATA = res;
        return MakeReport(res);
    }

    function getTovByPostav(postav){                
        var res =[];      
        var tp = document.getElementById("postav"+postav).innerText;
        data.forEach(el => {
            if (el.postav.toLowerCase() == tp.toLowerCase()){
                res.push(el);
            }
        });
        LAST_DATA = res;
        return MakeReport(res);
    }
    
    function MakeReport(res){
        var sdata = [];
        var scol = [];
        var tr ='';

    //Colums names section                 
       const cols = ['postav', 'dtZav', 'dtProd', 'kod', 'nazv', 'doZav', 'zavezeno', 'prodano', 'ost', 'inPrice', 'price' , 'pers','tip'];
       const rusCols = ['Поставщик','Завоз','Продажа','Код','Название','доЗав', 'Завез-но', 'Прод-но', 'Ост', 'ВхЦена','Цена','%','Тип'];

       const setColNames = (col)=>{
            var ar=[];
            var i=0;
              rusCols.forEach(names=> {
              ar.push(`<td class="tdStyle" onclick="SortByCol('${cols[i]}')">${names}</td>`);
              i++;
              });              
              const v = '<tr class="trHeaderStyle">\n<td class="tdStyle">No</td>\n';
              return v+ar.join('\n')+'</tr>\n';
          }
          //End of colums names section  

        const header = '<table class="ReportTable"><tbody>\n';

            res.forEach((el,index) => {                                          
               tr = `<tr style="background:${index % 2 === 0 ? "#b3e8b3": "#a1b9ff"}">\n` +
                    `<td>${index+1}</td>\n`;
                
                cols.forEach(names=>{
                  var addstyle = '';
                  var addLink = el[names];
                  
                  if (names == 'kod'){
                      addLink = `<p onclick="kodClick('${el[names]}')">${el[names]}</p>`;
                      addstyle = 'style="font-weight:bold"';
                  }                                     

                  if (names == 'postav'){
                      addLink = `<p onclick="postClick('${el[names]}')">${el[names]}</p>`;                      
                  }                   

                  if (names == 'tip'){
                      addLink = `<p onclick="tipClick('${el[names]}')">${el[names]}</p>`;
                      addstyle = 'style="font-weight:bold"';
                  }                                     

                  if (names == 'nazv'){
                      addLink = `<p onclick="nazvClick('${el[names]}')">${el[names]}</p>`;                      
                  }                   

                  if (names=='ost') {
                    if (el[names]<1) {
                     addstyle = 'style="font-weight:bold;color:red"';
                    } else {addstyle = 'style="font-weight:bold"';}
                  }

                  if(names=='inPrice'){
                    addstyle = 'style="font-weight:bold;color:blue"';
                  }
                  
                  scol.push(`<td ${addstyle}>${addLink}</td>\n`);
                })  //end col.map

                sdata.push(tr+scol.join('')+'</tr>\n');
                scol.length = 0;
            
            }) //enf of map.data                     

        return header+setColNames(cols)+sdata.join('')+'</tbody></table>\n';
    }

  function jsonToArr(jsn){
    var cols = [];             
         for (const key in jsn) {
           if (Object.hasOwnProperty.call(jsn, key)) {          
             cols.push(key);
           };
         };            
         return cols;
  } 

  function getInfByCode(kod){
    var res = []; 
    res.push('<table class="RaportTable">');
    data.forEach(elm => {
      if (elm.kod == kod) {
          var zavN = jsonToArr(elm.zav);                  
            res.push('<tr>');
            res.push(`<td>Дата</td> <td>КодЗав</td><td>Постав</td><td> Кол-во</td><td>ВхЦена</td>`);                        
            res.push('</tr>');

          for (let i = 0; i < zavN.length; i++) {                              
            var v = elm.zav[zavN[i]];
            res.push(`<tr style="background:${i % 2 === 0 ? "#b3e8b3": "#a1b9ff"}">`);
            res.push(`<td> ${v.dateZav}</td> <td>${v.kodZav}</td><td> ${v.postav}</td><td> ${v.kol}</td><td> ${v.inPrice}</td>`);                        
            res.push('</tr>');
        }                      
      };
    });    
    res.push('</table>');
    return res;
  }


  function ShowTipbyCode(kod){
    var dv = document.getElementById("ZavozWnd");     
    //var rs = document.getElementById("resTable");     
    //console.log(rs.left,rs.top);
    //dv.setAttribute('style',`visibility:visible; top:${Number(POS_X-rs.left)}px; left:${Number(POS_Y-rs.top)}px`);        
    dv.setAttribute('style','visibility:visible;');        
    dv.innerHTML = getInfByCode(kod).join(' ');    
  }

function Search(){
  var res = document.getElementById("sLine").value;   
   var sl = res.split(' ');   
  var  ar = [];
  var  ok = k = 1;
   data.forEach(el => {

    if (el.kod.toLowerCase() == res) {
      ar.push(el);
    }

     sl.forEach(wrd =>{
        if (el.nazv.toLowerCase().match(wrd)) {ok=1;} else {ok=0;}
        k=k*ok;
    })        

    if (k==1) {ar.push(el);}
    k=1;
  });     
  var res = document.getElementById("resTable");      
      res.innerHTML = MakeReport(ar);
      LAST_DATA = ar;
}

function HideZavWnd(){
  var dv = document.getElementById("ZavozWnd");     
    dv.setAttribute('style','visibility:hidden;');   
}

function MenuClick(){
  var dv = document.getElementById("mainMenu");     
    dv.setAttribute('style','visibility:visible; height:auto;'); 
  var dz = document.getElementById("resTable");     
    dz.setAttribute('style','visibility:hidden;');        
}

function MenuHide(){
  var dv = document.getElementById("mainMenu");     
    dv.setAttribute('style','visibility:hidden; height:0;');      
}

function CleraArea(){
  document.getElementById("resTable").innerHTML ='';
}

function SortByCol(col){

      var tipArr =[];            
      var res =[];  
      var v=[];

      LAST_DATA.forEach(element => {
          tipArr.push(element[col].toLowerCase());
        });

      if (parseFloat(tipArr[0])==NaN){
        tipArr.sort();  
      } else {tipArr.sort((a,b)=>a-b);}
      
      res.push(tipArr[0]);
      for (let i = 0; i < tipArr.length-1; i++) {
          if (tipArr[i] != tipArr[i+1]) {
            res.push(tipArr[i+1]);
          }
      }      

      res.forEach(r => {              
        LAST_DATA.forEach(el => {
          if(r==el[col]){
            v.push(el);
          }
      });
    });
    console.log(v);
    LAST_DATA = v;
    var es = document.getElementById("resTable");
      es.setAttribute("style","visibility:visible") ;     
      es.innerHTML =  MakeReport(v);
    }


</script>
</BODY>
</HTML>
